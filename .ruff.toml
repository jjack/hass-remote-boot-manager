# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.per-file-ignores]
# Ignore strict rules that aren't practical in test files
"tests/**/*" = [
    "S101",     # use of assert detected
    "PLR2004",  # magic value used in comparison
    "TC002",    # move third-party import into a type-checking block
    "TC003",    # move stdlib import into a type-checking block
    "ANN",      # missing type annotations (fixtures)
    "ARG001",   # unused function argument (pytest fixtures)
    "SLF001",   # private member accessed (we need to test private methods/attributes)
    "PT011",    # pytest.raises() is too broad (no match string)
    "E501",     # line too long (tests often have long descriptive names or mock strings)
    "D",        # missing docstrings in tests
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
