send_magic_packet:
  name: Send magic packet
  description: Send a magic packet to wake up a device with "Wake-On-LAN".
  fields:
    mac:
      name: MAC address
      description: MAC address of the device to wake up.
      required: true
      example: "00:01:02:03:04:05"
      selector:
        text:
    broadcast_address:
      name: Broadcast IP address
      description: IP address of the host to send the magic packet to.
      required: false
      example: "255.255.255.255"
      selector:
        text:
    broadcast_port:
      name: Broadcast port
      description: Port to send the magic packet to.
      required: false
      example: 9
      selector:
        number:
